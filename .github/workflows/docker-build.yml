name: Build Docker Image and Export to Tarball

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'any-auto-register'
        required: false
        default: ''
        type: string

jobs:
  build-and-export-image:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Generate image tag
        id: taggen
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            SHA_SHORT=${{ github.sha }}
            echo "TAG=manual-${TIMESTAMP}-${SHA_SHORT:0:7}" >> $GITHUB_OUTPUT
          fi
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          image: any-auto-register
          tags: |
            type=raw,value=${{ steps.taggen.outputs.TAG }}
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CAMOUFOX_VERSION=135.0.1
            CAMOUFOX_RELEASE=beta.24
      
      - name: Export image to tar file
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.tags }}"
          
          # Create filename from tag
          FILENAME="any-auto-register-${IMAGE_TAG}.tar"
          
          # Export to tar
          echo "Exporting image to: ${FILENAME}"
          docker save -o ${FILENAME} any-auto-register:${IMAGE_TAG}
          
          # Show file size
          ls -lh ${FILENAME}
          
          # Set env for upload step
          echo "EXPORTED_FILE=${FILENAME}" >> $GITHUB_ENV
      
      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: any-auto-register-docker-image-${{ steps.taggen.outputs.TAG }}
          path: ${{ env.EXPORTED_FILE }}
          retention-days: 30
          if-no-files-found: error