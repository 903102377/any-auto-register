name: Build Docker Image (Optimized)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '镜像标签（留空自动生成）'
        required: false
        default: ''
        type: string

permissions:
  actions: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Generate tag
        id: taggen
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=build-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and load image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: any-auto-register:${{ steps.taggen.outputs.TAG }}
          cache-from: type=gha
          build-args: |
            CAMOUFOX_VERSION=135.0.1
            CAMOUFOX_RELEASE=beta.24
      
      - name: Show image info
        run: |
          echo "=== Built Images ==="
          docker images | grep any-auto-register
          docker image inspect any-auto-register:${{ steps.taggen.outputs.TAG }} --format 'Size: {{.Size}} bytes'
      
      - name: Export to tarball
        run: |
          TAG=${{ steps.taggen.outputs.TAG }}
          FILE=any-auto-register-${TAG}.tar
          docker save -o ${FILE} any-auto-register:${TAG}
          ls -lh ${FILE}
          echo "FILE=${FILE}" >> $GITHUB_ENV
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.taggen.outputs.TAG }}
          path: ${{ env.FILE }}
          retention-days: 30
