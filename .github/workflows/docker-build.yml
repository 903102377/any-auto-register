name: Build Docker Image and Export to Tarball

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-export-image:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          image: any-auto-register
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CAMOUFOX_VERSION=135.0.1
            CAMOUFOX_RELEASE=beta.24
      
      - name: Export image to tar file
        run: |
          # Get the first tag from metadata
          IMAGE_TAG="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$IMAGE_TAG" | head -n 1)
          
          # Create filename from tag (replace / and : with -)
          FILENAME=$(echo "$FIRST_TAG" | tr '/' '-' | tr ':' '-')
          
          # Export to tar
          echo "Exporting image to: ${FILENAME}.tar"
          docker save -o ${FILENAME}.tar any-auto-register:${FIRST_TAG##*:}
          
          # Show file size
          ls -lh ${FILENAME}.tar
          
          # Set env for upload step
          echo "EXPORTED_FILE=${FILENAME}.tar" >> $GITHUB_ENV
      
      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: any-auto-register-docker-image
          path: ${{ env.EXPORTED_FILE }}
          retention-days: 30
          if-no-files-found: error