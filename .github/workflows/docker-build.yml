name: Build Docker Image and Export to Tarball

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '可选的镜像标签名称（留空则使用默认值）'
        required: false
        default: ''
        type: string

permissions:
  actions: write
  contents: read

jobs:
  build-and-export-image:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Generate image tag
        id: taggen
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            SHA_SHORT=${{ github.sha }}
            echo "TAG=manual-${TIMESTAMP}-${SHA_SHORT:0:7}" >> $GITHUB_OUTPUT
          fi
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          image: any-auto-register
          tags: |
            type=raw,value=${{ steps.taggen.outputs.TAG }}
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CAMOUFOX_VERSION=135.0.1
            CAMOUFOX_RELEASE=beta.24
      
      - name: Verify image was built
        run: |
          echo "=== Checking built images ==="
          docker images
          
          IMAGE_NAME="any-auto-register"
          IMAGE_TAG="${{ steps.meta.outputs.tags }}"
          
          echo "=== Checking specific image: ${IMAGE_NAME}:${IMAGE_TAG} ==="
          docker images ${IMAGE_NAME}:${IMAGE_TAG} --format "{{.Repository}}:{{.Tag}} - Size: {{.Size}}"
          
          if ! docker image inspect ${IMAGE_NAME}:${IMAGE_TAG} > /dev/null 2>&1; then
            echo "ERROR: Image ${IMAGE_NAME}:${IMAGE_TAG} not found!"
            docker images
            exit 1
          fi
      
      - name: Export image to tar file
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.tags }}"
          FILENAME="any-auto-register-${IMAGE_TAG}.tar"
          
          echo "Exporting image to: ${FILENAME}"
          echo "Source image: any-auto-register:${IMAGE_TAG}"
          
          docker save -o ${FILENAME} any-auto-register:${IMAGE_TAG}
          
          echo "=== Exported file details ==="
          ls -lh ${FILENAME}
          FILE_SIZE=$(stat -c%s ${FILENAME} 2>/dev/null || stat -f%z ${FILENAME} 2>/dev/null)
          echo "File size in bytes: ${FILE_SIZE}"
          
          if [ "${FILE_SIZE}" -lt 100000000 ]; then
            echo "WARNING: File size seems too small (< 100MB)"
            echo "This might indicate an incomplete export"
          fi
          
          echo "EXPORTED_FILE=${FILENAME}" >> $GITHUB_ENV
      
      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: any-auto-register-docker-image-${{ steps.taggen.outputs.TAG }}
          path: ${{ env.EXPORTED_FILE }}
          retention-days: 30
          if-no-files-found: error